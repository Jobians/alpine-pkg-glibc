name: Build ARM64 glibc APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build glibc APK in Alpine container
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src alpine:edge sh -eux << 'EOF'
            # Install build tools
            apk update
            apk add --no-cache alpine-sdk abuild fakeroot wget shadow

            # Properly create builder group & user
            addgroup abuild
            adduser -D -G abuild builder

            # Generate signing key and install public key
            su builder -c "abuild-keygen -a -i -n"

            # Run the build as the non-root user
            su builder -c "cd /src && abuild -r"
          EOF

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: glibc-arm64
          path: packages/**/**/*.apk
