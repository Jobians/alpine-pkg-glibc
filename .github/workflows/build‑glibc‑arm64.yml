name: Build ARM64 glibc APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Alpine container and build
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src alpine:edge sh -c "
            # Install build tools
            apk update && apk add --no-cache alpine-sdk abuild fakeroot wget

            # Create builder user
            addgroup builder abuild
            adduser -D -G builder builder

            # Generate signing key as builder user
            su builder -c 'abuild-keygen -a -i -n'

            # Build the package as builder user
            su builder -c 'cd /src && abuild -r'
          "

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: glibc-arm64
          path: packages/**/**/*.apk
