name: Build Alpine Package

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Try building the new release version
      # This action sets up the Alpine environment and runs abuild
      uses: acj/action-abuild@v1
      with:
        PACKAGE_PATH: "." # Path to the directory containing your APKBUILD file
        # You would typically pass secrets for signing if you want to publish the package
        # RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        # RSA_PUBLIC_KEY: ${{ secrets.RSA_PUBLIC_KEY }}

    - name: Upload artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: alpine-apk-package
        path: |
          /home/runner/packages/**/*.apk
          /home/runner/packages/**/*.asc
