name: Build Alpine Package

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory /github/workspace

      - name: Build glibc ${{ matrix.arch }}
        uses: jobians/action-abuild@master
        with:
          PACKAGE_PATH: "."
          release_version: "2.42"
          rsa_private_key: ${{ secrets.RSA_PRIVATE_KEY }}
          rsa_public_key: ${{ secrets.RSA_PUBLIC_KEY }}

      - name: Rename APKs
        run: |
          sudo chown -R $USER:$USER packages/
          cd packages/github/${{ matrix.arch }}
          for f in *.apk; do
            mv "$f" "${f%.apk}-${{ matrix.arch }}.apk"
          done

      - name: Create Release and Upload APKs
        uses: ncipollo/release-action@v1
        with:
          tag: v2.42-testing
          name: "Glibc 2.42 Build"
          body: "Automated multi-arch build of Alpine glibc packages."
          artifacts: "packages/**/*.apk,packages/**/APKINDEX.tar.gz"
          allowUpdates: true
          replacesArtifacts: true # This ensures x86_64 and aarch64 artifacts both stay in the release
          token: ${{ secrets.GITHUB_TOKEN }}
