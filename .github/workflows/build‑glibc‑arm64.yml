name: Build Alpine Package

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fix git safe directory
      run: git config --global --add safe.directory /github/workspace

    - name: Build the new release version
      uses: ivanvc/abuild-releaser-action@v1.2.0
      with:
        author: "JOBIANSTECHIE <jobianstechie@gmail.com>"
        rsa_private_key: ${{ secrets.RSA_PRIVATE_KEY }}
        rsa_public_key: ${{ secrets.RSA_PUBLIC_KEY }}
        generate_single_index_page: false

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: alpine-apk-package
        path: |
          /home/runner/packages/**/*.apk
          /home/runner/packages/**/*.asc
